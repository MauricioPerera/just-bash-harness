name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: typecheck + test + build + smokes
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # The harness resolves all sibling deps (@rckflr/agent-skills-cli,
      # just-bash, just-bash-data, just-bash-wiki) from npm registry
      # since v0.2.6. There is no `file:../` resolution and no `npm link`
      # — `npm ci` reads `package-lock.json` and pulls the published
      # versions. This means CI does NOT need to clone or build the
      # sibling repos; doing so would be wasted compute (~30s) since
      # the locally-built dists never get consumed.
      #
      # If you want to detect breakage in sibling repos before harness
      # CI runs, that's a separate concern — should live in its own
      # workflow per sibling, or in a downstream-canary mechanism that
      # lockstep-bumps the harness's deps when sibling main breaks.

      - name: Checkout harness
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install harness
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build harness
        run: npm run build

      - name: Verify built CLI runs
        run: node dist/cli.js --help

      # Smoke / integration. None of these need credentials or network.
      # smoke:cf-live is intentionally NOT run in CI — it costs tokens.

      - name: Smoke — FileBank + runExec (slice)
        run: npm run smoke:slice

      - name: Smoke — full loop (5 scripted scenarios)
        run: npm run smoke:e2e

      - name: Smoke — full loop with replayed Gemma decisions
        run: npm run smoke:cf-driven

      - name: Smoke — cross-session memory (wiki integration)
        run: npx tsx scratch/live-test-memory.ts

      - name: Smoke — compaction
        run: npx tsx scratch/live-test-compaction.ts

      - name: Smoke — encryption (AES-256-GCM at rest)
        run: npx tsx scratch/live-test-encryption.ts

      - name: Smoke — chains (multi-skill orchestration)
        run: npx tsx scratch/live-test-chains.ts

      - name: Smoke — Hermes <tool_call> tag parser
        run: npx tsx scratch/live-test-hermes.ts

      # Regression guard: verifies that policy.memory.compaction.summarize.enabled=false
      # preserves the v0.1.7 behavior byte-for-byte (no "Earlier conversation digest"
      # block in systemPrompt, no surprise summary provider call, no compaction-summary
      # memory record). Without this, "strict additive" is asserted but unproven.
      - name: Smoke — summarize=false regression guard
        run: npm run smoke:summarize-disabled

      # SECURITY regression guard for the v0.2.3 chains-bypass-approval bug:
      # verifies the loop.ts → approval.ts wiring fires for chain steps end-to-end.
      # Unit tests cover deriveCategory directly; this smoke catches a regression
      # in HOW deriveCategory gets called from the loop. See issue #6 +
      # LESSONS.md doctrine #1 for the bug class this guards against.
      - name: Smoke — chain-union approval wiring
        run: npm run smoke:chain-approval
